name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Windows desktop app
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile the test engine
        shell: pwsh
        run: |
          $compiler = 'C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe'
          if (-not (Test-Path -LiteralPath $compiler -PathType Leaf)) {
            throw "Required C# compiler was not found: $compiler"
          }
          & $compiler /nologo /out:tests\fake-engine.exe tests\FakeEngine.cs
          if ($LASTEXITCODE -ne 0) {
            throw "Fake engine compilation failed with exit code $LASTEXITCODE."
          }

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm run security:audit

      - name: Build production bundles
        run: npm run build
