# electron-builder 打包設定
# 產出：release/ 下的 Windows NSIS 安裝檔（npm run dist）或未打包目錄（npm run pack，驗證用）。
# 隨安裝檔提供免費 Pikafish 引擎與權重；授權及來源說明置於 resources/engine。
appId: com.xiangqi.analyzer
productName: 象棋AI分析講解
# 安裝檔檔名用 ASCII（package name），避免非 ASCII 檔名在散布時出問題
artifactName: ${name}-${version}-setup.${ext}
directories:
  output: release
  buildResources: resources/packaging
files:
  - out/**
  - package.json
extraResources:
  - from: resources/packaging/icon.png
    to: icon.png
  - from: resources/engine
    to: engine
win:
  icon: resources/packaging/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  include: resources/packaging/installer.nsh
# Release workflow 會讀取 WINDOWS_CSC_LINK / WINDOWS_CSC_KEY_PASSWORD。
# forceCodeSigning 保持 false 只為允許明確核准的過渡版；正式發布門檻預設拒絕未簽章產物。
forceCodeSigning: false
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  grantFileProtocolExtraPrivileges: false
